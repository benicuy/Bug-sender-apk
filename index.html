<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>QUANTUM BUG Ω</title>
  <link rel="stylesheet" href="style.css">
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@500;700&family=Roboto+Mono:wght@300;400;500&display=swap" rel="stylesheet">
</head>
<body>

  <video autoplay muted loop playsinline id="bgVideo">
    <source src="https://assets.mixkit.co/videos/preview/mixkit-digital-grid-with-neon-lines-327-large.mp4" type="video/mp4">
    Your browser does not support the video tag.
  </video>

  <div class="overlay"></div>

  <!-- Login -->
  <div id="loginPage" class="page active">
    <div class="card glass">
      <h1>QUANTUM_BUG_Ω</h1>
      <p class="subtitle">Elite Quantum Access</p>

      <input type="text" id="username" placeholder="IDENTIFIER" autocomplete="off" />
      <input type="password" id="password" placeholder="AUTH CODE" autocomplete="off" />

      <button onclick="login()" class="btn-primary">INITIATE ACCESS</button>
      <div id="loginStatus" class="status-msg"></div>
    </div>
  </div>

  <!-- Admin -->
  <div id="adminPage" class="page">
    <div class="card glass">
      <h1>ADMIN NEXUS</h1>
      <p class="welcome">Root Privileges Activated</p>

      <div class="section">
        <h3>Provision New Node</h3>
        <input type="text" id="newUsername" placeholder="New Node ID" />
        <input type="password" id="newPassword" placeholder="Node Auth Key" />
        <button onclick="createAccount()" class="btn-primary">PROVISION NODE</button>
        <div id="createStatus" class="status-msg"></div>
      </div>

      <div class="section">
        <h3>Quantum Token Forge</h3>
        <button onclick="generateApiKey()" class="btn-generate">FORGE NEW TOKEN</button>
        <div id="apiKeyDisplay" class="apikey-box">Forge a token to begin</div>
        <button id="copyBtn" onclick="copyApiKey()" class="btn-copy" style="display:none;">COPY TOKEN</button>
      </div>

      <div class="section">
        <h3>Payload Deployment</h3>
        <input type="text" id="target" placeholder="Target Node (628...)" />
        <input type="text" id="apikey" placeholder="Quantum Token" />
        <div class="button-grid">
          <button onclick="kirim('android')" class="btn-danger">ANDROID OVERLOAD</button>
          <button onclick="kirim('ios')" class="btn-danger">iOS TERMINATE</button>
          <button onclick="kirim('delay')" class="btn-danger">DELAY PHANTOM</button>
          <button onclick="kirim('vcard')" class="btn-danger">VCARD CORRUPTION</button>
        </div>
        <div id="status" class="status-box">NEXUS READY</div>
      </div>

      <button onclick="logout()" class="btn-logout">TERMINATE SESSION</button>
    </div>
  </div>

  <!-- User -->
  <div id="userPage" class="page">
    <div class="card glass">
      <h1>USER NEXUS</h1>
      <p class="welcome">Connection Established</p>

      <input type="text" id="targetUser" placeholder="Target Node (628...)" />
      <input type="text" id="apikeyUser" placeholder="Quantum Token" />

      <div class="button-grid">
        <button onclick="kirimUser('android')" class="btn-danger">ANDROID OVERLOAD</button>
        <button onclick="kirimUser('ios')" class="btn-danger">iOS TERMINATE</button>
        <button onclick="kirimUser('delay')" class="btn-danger">DELAY PHANTOM</button>
        <button onclick="kirimUser('vcard')" class="btn-danger">VCARD CORRUPTION</button>
      </div>

      <div id="statusUser" class="status-box">NEXUS READY</div>

      <button onclick="logout()" class="btn-logout">TERMINATE SESSION</button>
    </div>
  </div>

  <script src="script.js"></script>
</body>
        </html>
